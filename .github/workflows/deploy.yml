name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site (app files only — no .git, node_modules, tests, docs)
        run: |
          mkdir _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'e2e' \
            --exclude 'test-results' \
            --exclude 'playwright-report' \
            --exclude '_site' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'playwright.config.js' \
            --exclude 'EVALUATION.md' \
            --exclude 'api' \
            --exclude '.vercelignore' \
            ./ _site/

      - name: Inject Anthropic API key into config.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          printf "window.ANTHROPIC_API_KEY = '%s';\n" "$ANTHROPIC_API_KEY" > _site/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
