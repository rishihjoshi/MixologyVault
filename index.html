<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MixologyVault">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Your personal home bar companion">
  <title>MixologyVault</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="loading-screen" aria-live="polite" aria-label="Loading">
    <div class="spinner">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="error-screen" hidden>
    <div class="error-icon">🍸</div>
    <p>Couldn't load bar data. Check your connection.</p>
    <button id="retry-btn" class="btn-primary">Try Again</button>
  </div>

  <div id="app" hidden>
    <div id="scroll-area"></div>
    <nav id="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-screen="home" aria-label="Home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-screen="mybar" aria-label="My Vault">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        <span class="nav-label">My Vault</span>
      </button>
      <button class="nav-btn" data-screen="cocktails" aria-label="Cocktails">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M8 22h8M12 11v11M3 3l7 8h4l7-8"/>
        </svg>
        <span class="nav-label">Cocktails</span>
      </button>
      <button class="nav-btn" data-screen="mocktails" aria-label="Mocktails">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 22V12M3 7h18L17 3H7z"/><path d="M12 12C8 12 4 9 4 7"/>
        </svg>
        <span class="nav-label">Mocktails</span>
      </button>
      <button class="nav-btn" data-screen="decide" aria-label="Decide">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="4"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="nav-label">Decide</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" role="dialog" aria-modal="true" aria-label="Drink details">
    <div class="modal-sheet">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
